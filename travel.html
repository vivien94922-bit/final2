<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行用 Travel | VANTERA</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<style>
    .product { position: relative; }
    .favorite-icon, .share-icon {
        width: 24px !important; height: 24px !important; padding: 8px;
        position: absolute; bottom: 75px; cursor: pointer;
        box-sizing: content-box; transition: transform 0.2s; z-index: 2;
    }
    .favorite-icon { right: 50px; }
    .share-icon { right: 10px; }
</style>
<body>

<div id="header-placeholder"></div>

<section class="products">
    <h2>長途旅行 Check-In Travel</h2>
    <div class="product-grid" id="travel-grid"></div>
</section>
<footer>
  <p>聯絡我們｜
    <a href="mailto:vantera2026@gmail.com?subject=關於VANTERA的詢問&body=您好，我想詢問關於..." 
       style="color: #bbb; text-decoration: none;">
       vantera2026@gmail.com
    </a>
  </p>
  <p>© 2026 VANTERA. All rights reserved.</p>
  <p><a href="privacy.html" style="color:#bbb;">隱私權政策</a></p>
</footer>
<div id="footer-placeholder"></div>

<button id="backToTop" title="回到頂部">↑</button>

<script>
    // 1. 初始化頁面佈局
    async function initLayout() {
        try {
            // 建議直接在 HTML 寫好 Header/Footer，這裡僅作必要檢查
            const headerEl = document.getElementById('header-placeholder');
            const footerEl = document.getElementById('footer-placeholder');
            
            // 如果你有 header.html 和 footer.html，請確保檔案存在且名稱正確
            // 如果沒有，請刪除這兩行 fetch
            const [hRes, fRes] = await Promise.all([
                fetch('header.html').catch(() => ({ text: () => '' })),
                fetch('footer.html').catch(() => ({ text: () => '' }))
            ]);
            
            if (headerEl) headerEl.innerHTML = await hRes.text();
            if (footerEl) footerEl.innerHTML = await fRes.text();
            
            initHeaderUI();
        } catch (err) { console.error("Layout 載入失敗:", err); }
    }

    // 2. 初始化 Header 互動
    function initHeaderUI() {
        const searchIcon = document.getElementById("searchIcon");
        const searchBox = document.getElementById("searchBox");
        const menuIcon = document.getElementById("menuIcon");
        const menuBox = document.getElementById("menuBox");
        if (searchIcon && searchBox) searchIcon.addEventListener("click", () => searchBox.classList.toggle("active"));
        if (menuIcon && menuBox) menuIcon.addEventListener("click", () => menuBox.classList.toggle("active"));
    }

    // 3. 渲染商品函式
    function renderProducts(products, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = ""; // 清空舊內容

        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

        products.forEach(p => {
            const isFav = favorites.includes(p.id.toString());
            const heartImg = isFav ? "images/love.png" : "images/heart.png";

            container.insertAdjacentHTML('beforeend', `
                <div class="product" data-id="${p.id}">
                    <a href="product.html?id=${p.id}" class="product-link">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">NT$${p.price}</div>
                        </div>
                    </a>
                    <div class="product-actions">
                        <img src="${heartImg}" class="favorite-icon" onclick="toggleFavorite(event, this)">
                        <img src="images/share.png" class="share-icon" onclick="shareProduct(event, '${p.name}', 'product.html?id=${p.id}')">
                    </div>
                    <button class="add-cart-btn">加入購物車</button>
                </div>
            `);
        });
    }

    // 4. 核心啟動邏輯
    document.addEventListener("DOMContentLoaded", async () => {
        await initLayout();

        // 讀取唯一的 JSON 檔案
        fetch("products.json")
            .then(res => res.json())
            .then(data => {
                // 使用你提供的 products.json 結構 (data.products)
                // 這裡示範篩選 category 為 'travel' 的商品
                const allProducts = data.products || [];
                const travelProducts = allProducts.filter(p => p.category === 'travel');
                
                renderProducts(travelProducts, "travel-grid");
            })
            .catch(err => console.error("資料載入失敗，請確認 products.json 是否存在:", err));
    });
</script>
</body>
</html>
