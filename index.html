<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANTERA OFFICIAL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
  <style>
    .visitor {
        width: 200px;
        margin: 10px auto;
        padding: 5px;
        text-align: center;
        font-size: 18px;
    }

    /* 🧳 測驗專屬全新美化樣式 */
    .quiz-section {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        text-align: center;
        font-family: 'Noto Sans TC', sans-serif;
    }
    .quiz-section h3 {
        font-size: 24px;
        color: #222;
        margin-bottom: 25px;
        font-weight: 600;
        letter-spacing: 1px;
    }
    .quiz-progress {
        font-size: 14px;
        color: #888;
        margin-bottom: 15px;
    }
    .quiz-step {
        display: none; /* 預設隱藏，由 JS 控制顯示 */
        animation: fadeIn 0.4s ease-in-out;
    }
    .quiz-step.active {
        display: block;
    }
    .quiz-step p {
        font-size: 18px;
        color: #444;
        margin-bottom: 20px;
        font-weight: 500;
    }
    .quiz-section select {
        width: 100%;
        padding: 12px 20px;
        font-size: 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        background-color: #fafafa;
        color: #333;
        outline: none;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    .quiz-section select:focus {
        border-color: #222;
        background-color: #fff;
    }
    .quiz-btn-group {
        margin-top: 30px;
        display: flex;
        justify-content: space-between;
        gap: 15px;
    }
    .quiz-btn {
        flex: 1;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
    }
    .quiz-btn.next-btn, .quiz-btn.submit-btn {
        background-color: #222;
        color: #fff;
    }
    .quiz-btn.next-btn:hover, .quiz-btn.submit-btn:hover {
        background-color: #444;
    }
    .quiz-btn.prev-btn {
        background-color: #eee;
        color: #555;
    }
    .quiz-btn.prev-btn:hover {
        background-color: #ddd;
    }

    /* ✨ 測驗結果美化樣式 */
    .quiz-result-box {
        background: #f9f9f9;
        border-left: 5px solid #222;
        padding: 20px;
        margin-top: 25px;
        border-radius: 4px 12px 12px 4px;
        text-align: left;
        animation: fadeIn 0.5s ease;
    }
    .quiz-result-box h4 {
        margin: 0 0 10px 0;
        font-size: 20px;
        color: #222;
    }
    .quiz-result-box p {
        margin: 0;
        font-size: 15px;
        color: #666;
        line-height: 1.6;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    /* 開場動畫區塊 */
/* 全螢幕覆蓋 */
.intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;

    animation: fadeOut 0.8s ease forwards;
    animation-delay: 0.9s; /* 停留2秒後消失 */
}

/* 文字區 */
.intro-content {
    text-align: center;
    color: white;
    animation: zoomIn 1.2s ease;
}

/* 主標 */
.logo {
    font-size: 48px;
    letter-spacing: 6px;
    font-weight: 600;
}

/* 副標 */
.sub {
    font-size: 16px;
    opacity: 0.7;
    margin-top: 10px;
}

/* 放大進場 */
@keyframes zoomIn {
    from {
        transform: scale(1.2);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

/* 淡出 */
@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}
.clock {
    position: absolute; /* 相對於父容器定位 */
    right: 20px;
    bottom: 20px;
    background: rgba(0, 0, 0, 0.6); /* 半透明黑 */
    color: #fff;
    padding: 10px 15px;
    border-radius: 4px;
    font-family: 'Oxanium', sans-serif;
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(4px); /* 磨砂玻璃感 */
    z-index: 10;
    pointer-events: none;
    text-align: right;
}

.clock .time {
    font-size: 18px;
    font-weight: 600;
}

.clock .date {
    font-size: 10px;
    opacity: 0.8;
}
  .product-price {
    font-size: 14px;
    font-weight: 600;
    color: #666;
  }
.product-actions {
    display: flex;
    justify-content: center; /* 改為置中，或 flex-end 靠右 */
    gap: 15px;               /* 收藏與分享的間距 */
    margin: 10px 0;
}
/* 修正點號問題，並將邏輯分開 */
.favorite-icon, .share-icon {
    width: 24px !important;
    height: 24px !important;
    padding: 8px;
    position: absolute;
    bottom: 75px; /* 這裡要根據你的「加入購物車」按鈕位置調整 */
    cursor: pointer;
    box-sizing: content-box;
    transition: transform 0.2s;
    z-index: 2;
}

/* 分開設定位置，才不會重疊在同一個座標 */
.favorite-icon {
    right: 50px; /* 愛心靠右一點 */
}

.share-icon {
    right: 10px;  /* 分享靠最右邊 */
}
  </style>
</head>
<body>
<div id="intro" class="intro">
  <div class="intro-content">
    <div class="logo">VANTERA</div>
    <div class="sub">OFFICIAL</div>
  </div>
</div>
<div id="header-placeholder"></div>
<section class="banner">
  <img id="bannerImage" src="images/banner1.png">
    <div id="digital-clock" class="clock">
        <div class="time">00:00:00</div>
        <div class="date">2026/06/18</div>
    </div>
  <div class="banner-text">
    <h1 id="bannerTitle"></h1>
    <p id="bannerDesc"></p>
    <button id="bannerBuyNowBtn">立即選購</button>
  </div>
  <div id="dotsContainer"></div>
  <button class="prev">‹</button>
  <button class="next">›</button>
</section>

<section class="quiz-section" id="quizSection">
    <h3>測驗你最適合的行李箱</h3>
    <div class="quiz-progress" id="quizProgress">第 1 / 5 題</div>

    <form id="quizForm">
        <div class="quiz-step active" data-step="1">
            <p>你旅行頻率？</p>
            <select name="q1">
                <option value="1">很常（每月）</option>
                <option value="2">偶爾（每季）</option>
                <option value="3">很少</option>
            </select>
        </div>

        <div class="quiz-step" data-step="2">
            <p>旅行天數？</p>
            <select name="q2">
                <option value="1">1–3天</option>
                <option value="2">4–7天</option>
                <option value="3">7天以上</option>
            </select>
        </div>

        <div class="quiz-step" data-step="3">
            <p>你偏好行李重量？</p>
            <select name="q3">
                <option value="1">越輕越好</option>
                <option value="2">普通</option>
                <option value="3">不在意</option>
            </select>
        </div>

        <div class="quiz-step" data-step="4">
            <p>出國還是國內？</p>
            <select name="q4">
                <option value="1">常出國</option>
                <option value="2">國內旅遊</option>
                <option value="3">都差不多</option>
            </select>
        </div>

        <div class="quiz-step" data-step="5">
            <p>你的收納習慣？</p>
            <select name="q5">
                <option value="1">精簡派</option>
                <option value="2">普通整理</option>
                <option value="3">東西很多</option>
            </select>
        </div>

        <div class="quiz-btn-group">
            <button type="button" class="quiz-btn prev-btn" id="prevBtn" style="visibility: hidden;">上一題</button>
            <button type="button" class="quiz-btn next-btn" id="nextBtn">下一題</button>
            <button type="submit" class="quiz-btn submit-btn" id="submitBtn" style="display: none;">看結果</button>
        </div>
    </form>
</section>

<div class="visitor">
    您是本站第 <b id="visitorCount">...</b> 位訪客
</div>

<section class="products">
    <h2>熱門商品</h2>
    <div class="product-grid" id="hot-grid"></div>

    <h2>登機用 Boarding</h2>
    <div class="product-grid" id="boarding-grid"></div>

    <h2>旅行 Travel Series</h2>
    <div class="product-grid" id="travel-grid"></div>
    <h2>親子家庭專用 family</h2>
    <div class="product-grid" id="family-grid"></div>
</section>
<footer>
  <p>聯絡我們｜
    <a href="mailto:vantera2026@gmail.com?subject=關於VANTERA的詢問&body=您好，我想詢問關於..." 
       style="color: #bbb; text-decoration: none;">
       vantera2026@gmail.com
    </a>
  </p>
  <p>© 2026 VANTERA. All rights reserved.</p>
  <p><a href="privacy.html" style="color:#bbb;">隱私權政策</a></p>
</footer>
<button id="backToTop">↑</button>

<script src="script.js"></script>
<script src="cookie-consent.js" defer></script>

<script>
    // 1. 全域初始化邏輯
    document.addEventListener("DOMContentLoaded", () => {
        // A. Header 載入
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                const header = document.getElementById('header-placeholder');
                if (header) {
                    header.innerHTML = data;
                    initHeaderUI();
                }
            });

        // B. 開場動畫
        if (!sessionStorage.getItem("intro_shown")) {
            sessionStorage.setItem("intro_shown", "true");
            const introEl = document.getElementById("intro");
            if (introEl) introEl.style.display = "block";
        }
        window.addEventListener("load", () => {
            const intro = document.getElementById("intro");
            if (intro) setTimeout(() => intro.remove(), 2500);
        });

        // C. 心理測驗初始化
        initQuiz();

        // D. 載入產品資料 (統一入口)
        fetch("products.json")
            .then(res => res.json())
            .then(data => {
                const all = data.products;
                renderProducts(all.filter(p => p.category === 'boarding').slice(0, 3), "boarding-grid");
                renderProducts(all.filter(p => p.category === 'travel').slice(0, 3), "travel-grid");
                renderProducts(all.filter(p => p.category === 'family').slice(0, 3), "family-grid");
                renderProducts(all.filter(p => [1, 5, 7].includes(p.id)), "hot-grid");
            })
            .catch(err => console.warn("商品載入失敗:", err));

        // E. 時鐘初始化
        updateClock();
        setInterval(updateClock, 1000);
    });

    // 2. 功能模組：Header
    function initHeaderUI() {
        const sIcon = document.getElementById("searchIcon");
        const sBox = document.getElementById("searchBox");
        if (sIcon && sBox) sIcon.addEventListener("click", () => sBox.classList.toggle("active"));
    }

    // 3. 功能模組：商品渲染
    function renderProducts(products, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = "";
        products.forEach(p => {
            container.insertAdjacentHTML('beforeend', `
                <div class="product" data-id="${p.id}">
                    <a href="product.html?id=${p.id}" class="product-link">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name" style="line-height: 1.4; min-height: 55px;">${p.name}</div>
                            <div class="product-price">NT$${p.price}</div>
                        </div>
                    </a>
                    <div class="product-actions">
                        <img src="images/heart.png" class="favorite-icon" onclick="toggleFavorite(event, this)">
                        <img src="images/share.png" class="share-icon" onclick="shareProduct(event, '${p.name}', 'product.html?id=${p.id}')">
                    </div>
                    <button class="add-cart-btn">加入購物車</button>
                </div>
            `);
        });
    }

    // 4. 功能模組：心理測驗
    function initQuiz() {
        let currentStep = 1;
        const totalSteps = 5;
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const progressText = document.getElementById('quizProgress');
        const quizForm = document.getElementById('quizForm');

        function updateQuizStep() {
            if (!prevBtn || !nextBtn) return;
            document.querySelectorAll('.quiz-step').forEach(s => s.classList.remove('active'));
            const stepEl = document.querySelector(`.quiz-step[data-step="${currentStep}"]`);
            if (stepEl) stepEl.classList.add('active');
            if (progressText) progressText.innerText = `第 ${currentStep} / ${totalSteps} 題`;
            prevBtn.style.visibility = (currentStep === 1) ? 'hidden' : 'visible';
            nextBtn.style.display = (currentStep === totalSteps) ? 'none' : 'inline-block';
            submitBtn.style.display = (currentStep === totalSteps) ? 'inline-block' : 'none';
        }

        if (nextBtn) nextBtn.addEventListener('click', () => { if (currentStep < totalSteps) { currentStep++; updateQuizStep(); } });
        if (prevBtn) prevBtn.addEventListener('click', () => { if (currentStep > 1) { currentStep--; updateQuizStep(); } });

        if (quizForm) {
            quizForm.addEventListener('submit', function(e) {
                e.preventDefault();
                let score = Array.from(new FormData(this).values()).reduce((acc, v) => acc + parseInt(v), 0);
                
                let res = score <= 8 ? {t:"登機系列", l:"plane.html"} : (score <= 12 ? {t:"旅行系列", l:"travel.html"} : {t:"親子友善系列", l:"family.html"});
                
                quizForm.style.display = 'none';
                if(progressText) progressText.style.display = 'none';
                const resultArea = document.createElement('div');
                resultArea.className = 'quiz-result-box';
                resultArea.innerHTML = `<h4>推薦：${res.t}</h4><a href="${res.l}" class="quiz-btn">前往選購</a>`;
                document.getElementById('quizSection').appendChild(resultArea);
            });
        }
    }

    // 5. 功能模組：輔助工具 (分享、時鐘)
    function shareProduct(e, name, url) {
        e.preventDefault(); e.stopPropagation();
        if (navigator.share) navigator.share({title: 'VANTERA', text: name, url: url});
        else { navigator.clipboard.writeText(window.location.origin + '/' + url); alert('連結已複製！'); }
    }

    function updateClock() {
        const now = new Date();
        const tEl = document.querySelector('#digital-clock .time');
        const dEl = document.querySelector('#digital-clock .date');
        if (tEl) tEl.textContent = now.toTimeString().split(' ')[0];
        if (dEl) dEl.textContent = now.toISOString().split('T')[0].replace(/-/g, '/');
    }
</script>
</body>
</html>
