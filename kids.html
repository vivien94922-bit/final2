<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>親子友善 | VANTERA</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<style>

    /* 確保卡片定位點 */

.product {

    position: relative;

}



/* 圖示懸浮位置 (與首頁一致) */

.favorite-icon, .share-icon {

    width: 24px !important;

    height: 24px !important;

    padding: 8px;

    position: absolute;

    bottom: 75px;

    cursor: pointer;

    box-sizing: content-box;

    transition: transform 0.2s;

    z-index: 2;

}



.favorite-icon { right: 50px; }

.share-icon { right: 10px; }

</style>
<body>

<div id="header-placeholder"></div>

<section class="products">
    <h2>親子友善 Family Vacation</h2>
    <div class="product-grid" id="family-grid">
        </div>
</section>
<footer>
  <p>聯絡我們｜
    <a href="mailto:vantera2026@gmail.com?subject=關於VANTERA的詢問&body=您好，我想詢問關於..." 
       style="color: #bbb; text-decoration: none;">
       vantera2026@gmail.com
    </a>
  </p>
  <p>© 2026 VANTERA. All rights reserved.</p>
  <p><a href="privacy.html" style="color:#bbb;">隱私權政策</a></p>
</footer>

<div id="footer-placeholder"></div>

<script>
    // 簡單的 header 載入範例
fetch('header.html')
    .then(res => res.text())
    .then(data => document.getElementById('header-placeholder').innerHTML = data);
    // 1. 定義 Header 與 Footer 載入及互動初始化函式
    async function initPage() {
        // 載入 Header 並等待完成
        const headerRes = await fetch('header.html');
        const headerText = await headerRes.text();
        document.getElementById('header-placeholder').innerHTML = headerText;

        // 載入 Footer 並等待完成
        const footerRes = await fetch('footer.html');
        const footerText = await footerRes.text();
        document.getElementById('footer-placeholder').innerHTML = footerText;

        // 【關鍵】Header 內容出現後，立刻初始化 UI 事件
        initHeaderUI();
    }

    // 2. 初始化 Header 的互動功能
    function initHeaderUI() {
        const searchIcon = document.getElementById("searchIcon");
        const searchBox = document.getElementById("searchBox");
        const menuIcon = document.getElementById("menuIcon");
        const menuBox = document.getElementById("menuBox");

        if (searchIcon && searchBox) {
            searchIcon.addEventListener("click", () => {
                searchBox.classList.toggle("active");
            });
        }
        if (menuIcon && menuBox) {
            menuIcon.addEventListener("click", () => {
                menuBox.classList.toggle("active");
            });
        }
    }

    // 3. 頁面啟動邏輯 (修正版)
document.addEventListener("DOMContentLoaded", async () => {
    // 先載入 Layout
    await initPage();

    // 改用統一的資料庫檔案，並篩選出正確分類
    fetch("products.json") 
        .then(res => res.json())
        .then(data => {
            // 這裡直接篩選所有 category 為 'family' 的商品
            const familyProducts = data.products.filter(p => p.category === 'family');
            
            // 檢查是否真的抓到了
            console.log("目前讀取到的親子系列商品:", familyProducts);
            
            renderProducts(familyProducts, "family-grid");
        })
        .catch(err => console.error("資料載入失敗:", err));
});

    // 4. 商品渲染函式
    function renderProducts(products, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        // 讀取本地收藏狀態
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

        products.forEach(p => {
            const isFav = favorites.includes(p.id.toString());
            const heartImg = isFav ? "images/love.png" : "images/heart.png";

            container.insertAdjacentHTML('beforeend', `
                <div class="product" data-id="${p.id}">
                    <a href="product.html?id=${p.id}" class="product-link">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">NT$${p.price}</div>
                        </div>
                    </a>
                    <div class="product-actions">
                        <img src="${heartImg}" class="favorite-icon" onclick="toggleFavorite(event, this)">
                        <img src="images/share.png" class="share-icon" onclick="shareProduct(event, '${p.name}', 'product.html?id=${p.id}')">
                    </div>
                    <button class="add-cart-btn">加入購物車</button>
                </div>
            `);
        });
    }
    // 確保 DOM 加載完成後，監聽「整個網頁」的點擊
document.addEventListener("click", (e) => {
    if (e.target.classList.contains("add-cart-btn")) {
        e.preventDefault();
        
        const productEl = e.target.closest(".product");
        const id = productEl.dataset.id;
        const name = productEl.querySelector(".product-name").textContent;
        const priceText = productEl.querySelector(".product-price").textContent;
        const price = parseInt(priceText.replace(/[^0-9]/g, ''));
        const image = productEl.querySelector("img").src;

        // --- 核心修正區 ---
        let cartData = localStorage.getItem("cart");
        let cart = [];

        try {
            // 嘗試解析 JSON
            cart = JSON.parse(cartData);
            
            // 如果解析出來的不是陣列，就強制把它變回空陣列，避免報錯
            if (!Array.isArray(cart)) {
                cart = [];
            }
        } catch (error) {
            // 如果裡面存的是亂碼或壞掉的格式，重置為空陣列
            cart = [];
        }
        // ------------------

        // 現在 cart 保證是一個陣列，可以安全使用 find
        const existingItem = cart.find(item => item.id === id);
        
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ id, name, price, image, quantity: 1 });
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        console.log("購物車目前內容:", JSON.parse(localStorage.getItem("cart")));
    }
});
</script>
</body>
</html>
