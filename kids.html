<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>親子友善 | VANTERA</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<style>

    /* 確保卡片定位點 */

.product {

    position: relative;

}



/* 圖示懸浮位置 (與首頁一致) */

.favorite-icon, .share-icon {

    width: 24px !important;

    height: 24px !important;

    padding: 8px;

    position: absolute;

    bottom: 75px;

    cursor: pointer;

    box-sizing: content-box;

    transition: transform 0.2s;

    z-index: 2;

}



.favorite-icon { right: 50px; }

.share-icon { right: 10px; }

</style>
<body>

<div id="header-placeholder"></div>

<section class="products">
    <h2>親子友善 Family Vacation</h2>
    <div class="product-grid" id="family-grid">
        </div>
</section>
<footer>
  <p>聯絡我們｜
    <a href="mailto:vantera2026@gmail.com?subject=關於VANTERA的詢問&body=您好，我想詢問關於..." 
       style="color: #bbb; text-decoration: none;">
       vantera2026@gmail.com
    </a>
  </p>
  <p>© 2026 VANTERA. All rights reserved.</p>
  <p><a href="privacy.html" style="color:#bbb;">隱私權政策</a></p>
</footer>

<div id="footer-placeholder"></div>

<script>
    // 1. 初始化頁面佈局
    async function initLayout() {
        try {
            const hRes = await fetch('header.html');
            
            const headerEl = document.getElementById('header-placeholder');
            
            if (headerEl) { headerEl.innerHTML = await hRes.text(); initHeaderUI(); }
        } catch (err) { console.error("Layout 載入失敗:", err); }
    }

    // 2. Header 互動 UI
    function initHeaderUI() {
        const searchIcon = document.getElementById("searchIcon");
        const searchBox = document.getElementById("searchBox");
        const menuIcon = document.getElementById("menuIcon");
        const menuBox = document.getElementById("menuBox");
        if (searchIcon && searchBox) searchIcon.addEventListener("click", () => searchBox.classList.toggle("active"));
        if (menuIcon && menuBox) menuIcon.addEventListener("click", () => menuBox.classList.toggle("active"));
    }

    // 3. 唯一的渲染函式 (整合了所有顯示邏輯)
    function renderProducts(products, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

        container.innerHTML = products.map(p => {
            const isFav = favorites.includes(p.id.toString());
            return `
                <div class="product" data-id="${p.id}">
                    <a href="product.html?id=${p.id}" class="product-link">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">NT$${p.price}</div>
                        </div>
                    </a>
                    <div class="product-actions">
                        <img src="${isFav ? 'images/love.png' : 'images/heart.png'}" class="favorite-icon" onclick="toggleFavorite(event, this)">
                        <img src="images/share.png" class="share-icon" onclick="shareProduct(event, '${p.name}', 'product.html?id=${p.id}')">
                    </div>
                    <button class="add-cart-btn">加入購物車</button>
                </div>
            `;
        }).join('');
    }

    // 4. 啟動與資料處理
    document.addEventListener("DOMContentLoaded", async () => {
    // 1. 先初始化佈局
    await initLayout();

    // 2. 讀取商品資料 (統一用 products.json)
    fetch("products.json") 
        .then(res => {
            if (!res.ok) throw new Error("找不到產品檔案");
            return res.json();
        })
        .then(data => {
            // 修正：從 data.products 取得陣列，然後篩選 category
            // 請將 'boarding' 改為該頁面所屬的類別 (如 'travel' 或 'family')
            const allProducts = data.products || [];
            const filtered = allProducts.filter(p => p.category === 'boarding'); 
            
            console.log("成功讀取資料，篩選數量:", filtered.length);
            renderProducts(filtered, "boarding-grid");
        })
        .catch(err => {
            console.error("資料載入失敗:", err);
            document.getElementById("boarding-grid").innerHTML = "<p>資料載入中或發生錯誤，請稍後再試。</p>";
        });
});

    // 5. 購物車與其他互動
    document.addEventListener("click", (e) => {
        if (e.target.classList.contains("add-cart-btn")) {
            e.preventDefault();
            const pEl = e.target.closest(".product");
            const item = {
                id: pEl.dataset.id,
                name: pEl.querySelector(".product-name").textContent,
                price: parseInt(pEl.querySelector(".product-price").textContent.replace(/[^0-9]/g, '')),
                image: pEl.querySelector("img").src,
                quantity: 1
            };
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const existing = cart.find(i => i.id === item.id);
            if (existing) existing.quantity += 1;
            else cart.push(item);
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("已加入購物車！");
        }
    });

    function toggleFavorite(e, el) { e.preventDefault(); /* 收藏邏輯 */ }
    function shareProduct(e, name, url) { e.preventDefault(); /* 分享邏輯 */ }
</script>
</body>
</html>
