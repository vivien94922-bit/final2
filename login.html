<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員登入</title>

<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- 左側登入 -->
    <div class="login-section">

        <h2>登入</h2>
        <form>

            <input
                type="email"
                placeholder="Email"
                required>

            <input
                type="password"
                placeholder="密碼"
                required>

            <a href="#" class="forgot">
                忘記密碼?
            </a>

            <button type="submit" class="login-btn">
                登入
            </button>

        </form>

    </div>

    <!-- 中線 -->
    <div class="vertical-line"></div>

    <!-- 右側註冊 -->
    <div class="register-section">

        <h2>註冊 STANDARD DAY 會員</h2>

        <p class="intro">
            註冊成為 STANDARD DAY 會員即可享有：
        </p>

        <ul>
            <li>完成會員資料填寫享 9 折註冊禮金</li>
            <li>每年生日禮金 200 元優惠</li>
            <li>歷史訂單與購買紀錄查詢</li>
            <li>不定期的優惠活動</li>
        </ul>

        <button class="register-btn">
            註冊
        </button>

    </div>

</div>
<footer>
    <p>聯絡我們｜service@standardday.com</p>
    <p>© 2025 STANDARD DAY. All rights reserved.</p>
  </footer>

  <!-- 回到頂部 -->
  <button id="backToTop" title="回到頂部">↑</button>

  <!-- JS -->
  <script src="products.js"></script>
  <script src="script.js"></script>
<script>
    document.querySelector(".intro").style.display = "none";
    document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    // 假設登入成功
    localStorage.setItem("isLogin", "true");

    window.location.href = "member.html";
});
</script>
</body>
</html>
