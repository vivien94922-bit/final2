<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入｜STANDARD DAY</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: #f6f6f6;
}

/* ===== 登入區塊置中 ===== */
.login-wrapper{
    height: calc(100vh - 120px);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== 登入卡片 ===== */
.login-card{
    width: 360px;
    background: #fff;
    padding: 35px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform: translateY(20px);}
    to{opacity:1; transform: translateY(0);}
}

.login-title{
    font-size: 22px;
    margin-bottom: 20px;
    letter-spacing: 2px;
    color:#222;
}

/* ===== input ===== */
.login-input{
    width:100%;
    padding: 12px 14px;
    margin: 8px 0;
    border:1px solid #ddd;
    border-radius: 10px;
    outline:none;
    transition: 0.3s;
}

.login-input:focus{
    border-color:#333;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
}

/* ===== button ===== */
.login-btn{
    width:100%;
    padding: 12px;
    margin-top: 15px;
    border:none;
    border-radius: 10px;
    background:#222;
    color:white;
    cursor:pointer;
    font-size: 15px;
    transition: 0.3s;
}

.login-btn:hover{
    background:#444;
    transform: translateY(-2px);
}

/* ===== 註冊連結 ===== */
.register-link{
    margin-top: 15px;
    font-size: 13px;
    color:#666;
    cursor:pointer;
}

.register-link:hover{
    color:#000;
    text-decoration: underline;
}
</style>
</head>

<body>
<!-- ===== 登入區 ===== -->
<div class="login-wrapper">

  <div class="login-card">
    <div class="login-title">會員登入</div>

    <form id="login-form">
  <input class="login-input" type="text" id="username" name="username" placeholder="帳號" required>
  <input class="login-input" type="password" id="password" name="password" placeholder="密碼" required>
  <button class="login-btn" type="submit">登入</button>
</form>

    <div class="register-link" onclick="location.href='register.html'">
  還沒有帳號？立即註冊
</div>
  </div>

</div>

<!-- Cookie 同意 -->
<script src="cookie-consent.js" defer></script>
<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止表單預設送出行為

    const inputUser = document.getElementById('username').value;
    const inputPass = document.getElementById('password').value;

    // 從 localStorage 讀取該帳號對應的資料
    // 注意：這裡的 key 名稱必須與 register.html 存入時的名稱一致 (user_ + 帳號)
    const userDataString = localStorage.getItem('user_' + inputUser);

    if (userDataString) {
        // 如果帳號存在，將字串轉回物件
        const userData = JSON.parse(userDataString);

        // 比對密碼
        if (userData.password === inputPass) {
            alert("登入成功，歡迎 " + userData.name + "！");
            
            // 設定登入狀態與當前使用者名稱
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', userData.name);
            
            // 跳轉至會員中心
            location.href = 'member.html'; 
        } else {
            alert("密碼錯誤！");
        }
    } else {
        alert("找不到此帳號，請確認後再試或前往註冊。");
    }
});
</script>
</body>
</html>
