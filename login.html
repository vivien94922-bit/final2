<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入｜STANDARD DAY</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: #f6f6f6;
}

/* ===== 登入區塊置中 ===== */
.login-wrapper{
    height: calc(100vh - 120px);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== 登入卡片 ===== */
.login-card{
    width: 360px;
    background: #fff;
    padding: 35px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform: translateY(20px);}
    to{opacity:1; transform: translateY(0);}
}

.login-title{
    font-size: 22px;
    margin-bottom: 20px;
    letter-spacing: 2px;
    color:#222;
}

/* ===== input ===== */
.login-input{
    width:100%;
    padding: 12px 14px;
    margin: 8px 0;
    border:1px solid #ddd;
    border-radius: 10px;
    outline:none;
    transition: 0.3s;
}

.login-input:focus{
    border-color:#333;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
}

/* ===== button ===== */
.login-btn{
    width:100%;
    padding: 12px;
    margin-top: 15px;
    border:none;
    border-radius: 10px;
    background:#222;
    color:white;
    cursor:pointer;
    font-size: 15px;
    transition: 0.3s;
}

.login-btn:hover{
    background:#444;
    transform: translateY(-2px);
}

/* ===== 註冊連結 ===== */
.register-link{
    margin-top: 15px;
    font-size: 13px;
    color:#666;
    cursor:pointer;
}

.register-link:hover{
    color:#000;
    text-decoration: underline;
}
</style>
</head>

<body>
<!-- ===== 登入區 ===== -->
<div class="login-wrapper">

  <div class="login-card">
    <div class="login-title">會員登入</div>

    <form id="login-form">
  <input class="login-input" type="text" id="username" name="username" placeholder="帳號" required>
  <input class="login-input" type="password" id="password" name="password" placeholder="密碼" required>
  <button class="login-btn" type="submit">登入</button>
</form>

    <div class="register-link" onclick="location.href='register.jsp'">
  還沒有帳號？立即註冊
</div>
  </div>

</div>

<!-- Cookie 同意 -->
<script src="cookie-consent.js" defer></script>
<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止頁面跳轉

    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    // 這裡模擬你的後端資料驗證
    // 真實應用中，這裡應該是 fetch('your-api-url')
    if (user === "admin" && pass === "1234") {
        alert("登入成功！");
        localStorage.setItem('isLoggedIn', 'true'); // 設定登入狀態
        location.href = 'member.html'; // 導向會員中心
    } else {
        alert("帳號或密碼錯誤！");
    }
});
</script>

</body>
</html>
