<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員登入</title>

<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- 左側登入 -->
    <div class="login-section">

        <h2>登入</h2>

        <button class="social-btn google">
            <i class="fa-brands fa-google"></i>
            Google 登入
        </button>

        <div class="divider">
            <span>or</span>
        </div>

        <form>

            <input
                type="email"
                placeholder="Email"
                required>

            <input
                type="password"
                placeholder="密碼"
                required>

            <a href="#" class="forgot">
                忘記密碼?
            </a>

            <button type="submit" class="login-btn">
                登入
            </button>

        </form>

    </div>

    <!-- 中線 -->
    <div class="vertical-line"></div>

    <!-- 右側註冊 -->
    <div class="register-section">

        <h2>註冊 STANDARD DAY 會員</h2>

        <p class="intro">
            註冊成為 STANDARD DAY 會員即可享有：
        </p>

        <ul>
            <li>完成會員資料填寫享 9 折註冊禮金</li>
            <li>每年生日禮金 200 元優惠</li>
            <li>歷史訂單與購買紀錄查詢</li>
            <li>不定期的優惠活動</li>
        </ul>

        <button class="register-btn">
            註冊
        </button>

    </div>

</div>

</body>
</html>
