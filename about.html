<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我們｜VANTERA</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100&family=Oxanium&display=swap" rel="stylesheet">
    
    <script src="script.js" defer></script>
    
    <style>
        body { margin: 0; font-family: "Oxanium","Noto Sans TC", sans-serif; font-weight: 100; }
        .about-header { background-color: #f2f2f2; padding: 20px; text-align: center; }
        .animated-title { font-size: 28px; opacity: 0; transform: translateX(-50px); animation: slideFadeIn 1s forwards; }
        @keyframes slideFadeIn { to { opacity: 1; transform: translateX(0); } }
        .about-container { max-width: 1000px; margin: 30px auto; padding: 0 30px; }
        .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .team-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; text-align: center; padding: 20px; transition: transform 0.3s, box-shadow 0.3s; }
        .team-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .team-card img { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; }
        .student-id { font-size: 13px; color: #888; margin: 10px 0 2px 0; }
        .team-card h3 { margin: 0 0 5px 0; font-size: 20px; }
        .team-card h4 { font-size: 14px; color: #565254; background: #eee; display: inline-block; padding: 3px 10px; border-radius: 20px; margin: 5px 0; }
        .team-card p { font-family: "Noto Sans TC", sans-serif; font-size: 14px; line-height: 1.7; color: #444; text-align: justify; margin-top: 12px; border-top: 1px dashed #eee; padding-top: 10px; }
        .work-progress { margin-top: 15px; text-align: left; }
        .progress-label { font-size: 13px; margin-bottom: 6px; color: #444; }
        .progress-bar { width: 100%; height: 10px; background-color: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, #222, #555); border-radius: 10px; transition: width 1.5s ease; }
        @media (max-width: 768px) { .team-grid { grid-template-columns: repeat(1, 1fr); } }
    </style>
</head>

<body>

<div id="header-placeholder"></div>

<section class="about-header">
    <h1 class="animated-title">關於我們</h1>
</section>

<main class="about-container">
    <section class="about-section">
        <h2>品牌故事</h2>
        <p>VANTERA 誕生於對旅行與探索的熱愛。我們相信，每一次出發都是開啟新故事的開始...</p>
    </section>

    <section class="about-section team-section">
        <h2>團隊介紹</h2>
        <div class="team-grid">
            <div class="team-card">
                <img src="images/member1.jpg" alt="蕭小雯">
                <div class="student-id">11344222</div>
                <h3>蕭小雯</h3>
                <h4>負責交易邏輯、結帳 API、訂單處理。</h4>
                <p>將課堂技術實際運用真的非常不容易，感謝組員們互相配合...</p>
                <div class="work-progress">
                    <div class="progress-label">工作分配 50%</div>
                    <div class="progress-bar"><div class="progress-fill" data-percent="50"></div></div>
                </div>
            </div>
            <div class="team-card">
                <img src="images/member3.jpg" alt="簡嘉葳">
                <div class="student-id">11344218</div>
                <h3>簡嘉葳</h3>
                <h4>負責留言板、會員登入、搜尋、後台管理。</h4>
                <p>這次經驗不僅提升了我的程式設計能力，也讓我更了解團隊合作的重要性。</p>
                <div class="work-progress">
                    <div class="progress-label">工作分配 50%</div>
                    <div class="progress-bar"><div class="progress-fill" data-percent="50"></div></div>
                </div>
            </div>
        </div>
    </section>
</main>
<footer>
  <p>聯絡我們｜
    <a href="mailto:vantera2026@gmail.com?subject=關於VANTERA的詢問&body=您好，我想詢問關於..." 
       style="color: #bbb; text-decoration: none;">
       vantera2026@gmail.com
    </a>
  </p>
  <p>© 2026 VANTERA. All rights reserved.</p>
  <p><a href="privacy.html" style="color:#bbb;">隱私權政策</a></p>
</footer>

<button id="backToTop" title="回到頂部">↑</button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 確保先載入 Header
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                // 若 Header 內有選單互動，這裡記得呼叫 initHeaderUI()
            });

        // 【關鍵修正】：使用 setTimeout 確保 DOM 渲染完成後再觸發寬度動畫
        setTimeout(() => {
            document.querySelectorAll(".progress-fill").forEach(bar => {
                const percent = bar.dataset.percent;
                if (percent) {
                    bar.style.transition = "width 1.5s ease-in-out"; // 確保有轉場動畫
                    bar.style.width = percent + "%";
                }
            });
        }, 500); // 等待 0.5 秒確保頁面穩定

        // 回到頂部按鈕邏輯
        const backToTopBtn = document.getElementById("backToTop");
        window.onscroll = () => {
            if (window.scrollY > 300) backToTopBtn.style.display = "block";
            else backToTopBtn.style.display = "none";
        };
        backToTopBtn.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
    });
</script>

</body>
</html>
