<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳付款</title>
    <link rel="stylesheet" href="check.css">
</head>
<body>

<div class="checkout-container">
    <h2 class="main-title">結帳付款</h2>
    
    <form id="checkoutForm">
        <div class="section">
            <h3 class="section-title">收件人資訊</h3>
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="label-text">姓名</span>
                    <input type="text" placeholder="請輸入完整姓名" required>
                </div>
            </div>
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="label-text">電話</span>
                    <input type="tel" placeholder="請輸入電話號碼" required>
                </div>
            </div>
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="label-text">地址</span>
                    <input type="text" placeholder="請輸入完整地址" required>
                </div>
            </div>
        </div>

        <div class="section">
            <h3 class="section-title">付款方式</h3>
            <div class="payment-options">
                <label class="payment-item">
                    <input type="radio" name="payment" value="credit" checked>
                    <span class="radio-custom"></span>
                    <span class="payment-label">信用卡 (線上支付)</span>
                </label>
                <label class="payment-item">
                    <input type="radio" name="payment" value="linepay">
                    <span class="radio-custom"></span>
                    <span class="payment-label line-pay-text">LINE Pay</span>
                </label>
                <label class="payment-item">
                    <input type="radio" name="payment" value="cod">
                    <span class="radio-custom"></span>
                    <span class="payment-label">超商取貨付款</span>
                </label>
            </div>
        </div>

<div class="summary">
    <div class="summary-line">
        <span>商品小計</span>
        <span id="subtotal-display">$1,280</span> </div>
    <div class="summary-line">
        <span>運費</span>
        <span id="shipping-fee-display">$60</span> </div>
    <div class="divider"></div>
    <div class="summary-line total">
        <span>總計</span>
        <span id="total-Amount">$1,340</span> </div>
</div>

        <button type="submit" class="submit-btn">確認送出訂單</button>
    </form>
</div>
    <script src="check.js"></script>
</body>
</html>
