<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="product.css"> 
  <script src="script.js"></script>
</head>
<body>

  <!-- Header / Navbar（共用） -->
    <header>
      <div class="nav-left">
        <a href="index.html" class="logo">STANDARD DAY</a>
      </div>
    
      <div class="nav-icons">
        <div class="search-wrapper">
          <img src="images/search.png" alt="Search" id="searchIcon">
          <div class="search-box" id="searchBox">
            <div class="search-input">
                <img src="images/search.png" alt="">
                <input type="text" id="searchInput" placeholder="搜尋商品...">
                <div class="search-result" id="searchResult"></div>
            </div>
          </div>
        </div>
    
        <div class="menu-wrapper">
          <img src="images/clothes.png" alt="Browse" id="menuIcon">
           <div class="menu-box" id="menuBox">
                <a href="tops.html" class="menu-item">
                  <img src="images/tops.png" alt="Tops">
                </a>
                <a href="bottoms.html" class="menu-item">
                  <img src="images/bottoms.png" alt="Bottoms">
                </a>
          </div>
        </div>
    
        <a href="about.html" title="關於我們">
          <img src="images/info.png" alt="About">
        </a>
    
        <!-- user-area -->
        <a href="member.html" title="會員中心">
          <img src="images/user.png" alt="Member">
        </a>

        <a href="cart.html" title="購物車">
          <img src="images/shopping_cart.png" alt="Cart">
        </a>
      </div>
    </header>

  <main class="product-container">
  <!-- 左：圖片 -->
  <div class="product-images fade-up">
    <img id="mainImage" src="" alt="商品圖片">
  </div>

  <!-- 右：資訊 -->
  <div class="product-info fade-up" style="animation-delay:.2s">
    <h1 id="productName"></h1>
    <p id="productDesc"></p>
    <p class="price" id="productPrice"></p>

    <label class="form-group">
      尺寸選擇
      <select id="sizeSelect"></select>
    </label>

    <label class="form-group">
      數量
      <input type="number" value="1" min="1">
    </label>

    <button id="addCartBtn" class="add-cart">
      加入購物車
    </button>
  </div>
</main>

<!-- Tabs -->
<section class="tabs">
  <button class="tab active" data-tab="detail">商品描述</button>
  <button class="tab" data-tab="shipping">送貨及付款方式</button>
  <button class="tab" data-tab="review">顧客評價</button>
</section>

<section class="tab-content">
  <div id="detail" class="content active"></div>
  <div id="shipping" class="content"></div>
  <div id="review" class="content">
    <div id="feedback">
      <h3>顧客評價</h3>
      <p id="no-feedbacks">尚無評價</p>
      
      <div id="feedback-list"></div>

      <!-- 提交回饋表單 -->
      <div id="feedback-form">
        <h2>留下您的評價</h2>

        <label for="feedback-name"></label>
        <input type="text" id="feedback-name" placeholder="您的名稱">

        <label for="feedback-rating"></label>
        <select id="feedback-rating">
          <option value="1">1 顆星</option>
          <option value="2">2 顆星</option>
          <option value="3">3 顆星</option>
          <option value="4">4 顆星</option>
          <option value="5">5 顆星</option>
        </select>

        <label for="feedback-text"></label>
        <textarea id="feedback-text" placeholder="請輸入您的評價..."></textarea>

        <button id="submit-feedback">提交評價</button>
      </div>
  </div>
</section>
  
<footer>
    <p>聯絡我們｜service@standardday.com</p>
    <p>© 2025 STANDARD DAY. All rights reserved.</p>
  </footer>
  
  <!-- 回到頂部按鈕 -->
  <button id="backToTop" title="回到頂部">↑</button>
  
<script src="products.js"></script>
<script src="reviews.js"></script>
<script src="product.js"></script>
  
</body>
</html>
