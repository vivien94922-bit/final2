<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車｜VANTERA</title>
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="cart.js" defer></script>
    
    <style>
        /* 購物車頁面基礎排版 */
        .breadcrumb { max-width: 1000px; margin: 20px auto; color: #888; font-size: 14px; }
        .breadcrumb a { color: #000; text-decoration: none; }
        
        .total {
            max-width: 1000px;
            margin: 30px auto 15px auto;
            text-align: right;
            font-size: 18px;
            letter-spacing: 1px;
            color: #555;
            font-family: Arial, sans-serif;
        }

        #cart-total {
            font-size: 24px;
            font-weight: 600;
            color: #000;
            margin-left: 8px;
        }

        .checkout-container {
            max-width: 1000px;
            margin: 0 auto 50px auto;
            text-align: right;
        }

        .checkout-btn {
            background: #000;
            color: #fff;
            border: 1px solid #000;
            padding: 14px 45px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .checkout-btn:hover:not(:disabled) {
            background: #fff;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .checkout-btn:disabled {
            background: #e0e0e0;
            border-color: #e0e0e0;
            color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .discount-hint {
            max-width: 1000px;
            margin: 20px auto;
            padding: 14px 20px;
            background: #f8f9fa;
            border-left: 3px solid #000;
            font-size: 13px;
            color: #666;
            letter-spacing: 0.5px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>
  
    <div id="cart-container"></div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="discountHint" class="discount-hint"></div>
    
    <div class="total">
        總計：<span id="cart-total">NT$0</span>
    </div>
    
    <div class="checkout-container">
        <button id="checkoutBtn" class="checkout-btn" onclick="handleCheckout()" disabled>前往結帳</button>
    </div>

    <footer>
  <p>聯絡我們｜
    <a href="mailto:vantera2026@gmail.com?subject=關於VANTERA的詢問&body=您好，我想詢問關於..." 
       style="color: #bbb; text-decoration: none;">
       vantera2026@gmail.com
    </a>
  </p>
  <p>© 2026 VANTERA. All rights reserved.</p>
  <p><a href="privacy.html" style="color:#bbb;">隱私權政策</a></p>
</footer>
<div id="footer-placeholder"></div>

<button id="backToTop" title="回到頂部">↑</button>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. 載入 Header
        fetch('header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header-placeholder').innerHTML = data);

        // 2. 檢查是否有資料並渲染
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        console.log("當前購物車內容:", cart); // 檢查是否有資料
        
        if (typeof renderCart === 'function') {
            renderCart(); // 執行渲染
        } else {
            console.error("renderCart 未定義");
        }
    });
</script>
    <script src="cookie-consent.js" defer></script>
</body>
</html>
